services:
  graphrag:
    platform: linux/amd64
    image: tigergraph/graphrag:latest
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      SERVER_CONFIG: /code/configs/server_config.json
      TG_GSQL_PORT: "443"
    volumes:
      - ./configs:/code/configs:ro
      - ./data:/code/data:ro
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    networks:
      - app-network
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: dashboard/backend/Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - PORT=8080
      - GRAPHRAG_SERVICE_URL=http://graphrag:8000
    depends_on:
      - graphrag
    volumes:
      - ./results:/app/results
      - ./data:/app/data:ro
    networks:
      - app-network
    restart: unless-stopped

  frontend:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge
