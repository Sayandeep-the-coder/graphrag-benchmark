version: "3.9"

services:
  graphrag:
    image: tigergraph/graphrag:latest
    ports:
      - "8000:8000"
    env_file: .env
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: dashboard/backend/Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      - graphrag
    volumes:
      - ./results:/app/results
    restart: unless-stopped

  frontend:
    build:
      context: ./dashboard/frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
